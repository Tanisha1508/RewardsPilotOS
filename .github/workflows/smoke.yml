# Live-LLM smoke suite (KNOWN_LIMITATIONS 23) — the model-behaviour tripwire.
#
# Deliberately NOT part of the fast CI loop and NOT on a schedule by default:
# it spends real free-tier quota and is non-deterministic, so it is triggered
# manually from the Actions tab when a prompt, model pin, or planner change
# lands. The golden suite stays the fast determinism/contract check; this
# catches what it is structurally blind to — a real model emitting a
# well-formed but wrong-shaped plan (the D4 /chat failures).
#
# Requires the GEMINI_API_KEY secret. GROQ_API_KEY is optional and only adds
# the ADR-018 last-resort tier; without it the chain is Gemini-only.
#
# Exit codes are meaningful and the job surfaces them as-is:
#   0 — every structural check held on every run
#   1 — a structural check came in below N/N (a real regression)
#   2 — could not run (no key, or a query completed zero runs)
# A red run therefore distinguishes "the model regressed" from "we never
# actually called the model", which is the whole point of not letting this
# suite skip quietly.
#
# No database: the suite installs the in-memory fixture portfolio itself. One
# real dependency at a time — a failure here means the LLM, never Supabase.

# ── Rotation (KNOWN_LIMITATIONS 26) ──────────────────────────────────────────
# The Gemini free tier is 20 requests/day/model and a full 4-query N=3 run
# costs 24+, so the queries run as two fixed pairs on alternating days:
# ~12 calls/day, every query covered every other day. The runner picks the pair
# from the day-of-month parity, so nothing here needs to track state.
#
# Schedule: Mon & Thu at 08:20 UTC (posture: manual-primary, this Action is the
# low-contention backup — see KNOWN_LIMITATIONS 26). Twice-weekly, not daily,
# because CI and local runs share ONE free-tier budget (the quota is per Google
# project = per API key, not per machine), so a daily Action would collide with
# hand runs. It never gates a PR.
#
# Why 08:20 UTC specifically: the free-tier daily quota resets at 00:05 Pacific,
# which is 07:05 UTC in PDT and 08:05 UTC in PST. A fixed-UTC cron must clear the
# *later* of the two to stay after the reset year-round, so 08:20 UTC sits just
# past the PST reset and ~75 min past the PDT one — never before. (04:23 UTC, the
# previous value, fired ~3h BEFORE even the PDT reset and would 429 on contact.)
#
# Why Mon/Thu covers both rotation groups: the runner picks the pair by
# day-of-month parity (odd→a s01+s02, even→b s03+s04). Mon and Thu are 3 days
# apart — always opposite parity — so within a week one lands on group a and the
# other on group b, covering all four queries weekly. A month-boundary week can
# put both on the same parity (the 31st→1st repeat); that skips one group for a
# week, matching the documented parity edge, and is not worth carrying state to
# avoid.
#
# N is NOT reduced to fit. N=3 exists to catch *intermittent* planner failures
# (the D4 CompareCards omission presented as 3/6, not 0/6); N=1 would fit the
# quota while being blind to the exact bug class this suite was built for.
# Nor is Groq made primary: ADR-018 makes Gemini primary, so a Groq-primary
# suite would validate a path real users rarely take. If Gemini's quota does
# run out mid-run, default_llm() falls through to Groq exactly as production
# would — the quota shapes coverage frequency, not suite correctness.

name: smoke

on:
  schedule:
    - cron: "20 8 * * 1,4" # Mon & Thu 08:20 UTC — after the 00:05 PT quota reset (see note above)
  workflow_dispatch:
    inputs:
      runs:
        description: "Runs per query (N). Higher N costs more quota."
        required: false
        default: "3"
      group:
        description: "Query group: a, b, or all (blank = today's rotation)."
        required: false
        default: ""

concurrency:
  group: smoke
  cancel-in-progress: false

jobs:
  smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Set up Python 3.11
        run: uv python install 3.11

      - name: Install project
        run: |
          uv venv --python 3.11
          uv pip install -e "."

      - name: Run live-LLM smoke suite
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          # Blank on a scheduled run, so the runner falls back to the
          # day-parity rotation; set explicitly for a manual dispatch.
          SMOKE_RUNS: ${{ inputs.runs || '3' }}
          SMOKE_GROUP: ${{ inputs.group }}
        run: .venv/bin/python -m evaluation.smoke.run
