# Crawler sources (BUILD_SPEC §6). One entry per official source page the
# crawler watches for change. Each maps to the corpus doc it corroborates.
#
# `crawlable` records what fetch-testing on 2026-07-21 actually found — not an
# assumption. A source marked `crawlable: false` is skipped by the crawler and
# logged; its verified facts come from manual review of the underlying T&C, and
# the crawler cannot detect when it changes. These are documented as crawler
# blind spots in docs/KNOWN_LIMITATIONS.md.
#
# The crawler DETECTS change (page hash differs from last crawl) and records it
# for human re-verification. It never re-ingests scraped HTML into the verified
# corpus or edits rule files — the pages are partial blind spots (JS-rendered
# tables, PDFs behind the HTML) and the verified data is hand-authored
# (BUILD_SPEC §14a: detection is not extraction). See ADR-016.
#
# Adding a source is a PURE CONFIG CHANGE — append an entry to `sources` below
# with these fields; no code edit is needed (crawl.py loads every entry
# generically). As P2 cards get verified, add their official URLs here. Fetch-
# test each new URL for crawlability first (robots + static-vs-JS content) and
# set `crawlable` / `blind_spot` to what you actually find, not what you expect.
#
# Fields per source: key, doc_id (the corpus doc it corroborates), issuer,
# program, url, crawlable (bool), blind_spot (string or null).

user_agent: "RewardsPilotOS-crawler/0.1 (+https://github.com/Tanisha1508/RewardsPilotOS)"

sources:
  - key: hdfc_infinia
    doc_id: hdfc_infinia_reward_rules
    issuer: hdfc
    program: hdfc_reward_points
    url: https://www.hdfc.bank.in/credit-cards/infinia-credit-card
    crawlable: true
    # Corrected 2026-07-22. D3 used https://www.hdfcbank.com/... — a Cloudflare-
    # protected mirror whose /robots.txt returns HTTP 403, which RobotFileParser
    # reads (per RFC) as disallow-all. That was the wrong host, not a real block:
    # HDFC's canonical domain www.hdfc.bank.in serves /robots.txt as 200 with
    # "User-Agent: * / Allow: /" (it even allows ClaudeBot explicitly), and
    # /credit-cards/infinia-credit-card returns 200 with the reward content
    # (base 5/150, SmartBuy 10x) in STATIC HTML. No blind spot — fully crawlable.
    blind_spot: null

  - key: axis_atlas
    doc_id: axis_atlas_reward_rules
    issuer: axis
    program: edge_miles
    url: https://www.axisbank.com/retail/cards/credit-card/axis-bank-atlas-credit-card
    crawlable: true
    # Page is fetchable and robots allows it; base-earn and general content are
    # in static HTML. BUT the Travel EDGE transfer-partner table is JS-rendered
    # (verified 2026-07-21: of the partner names, only "accor" appears in static
    # HTML). The crawler detects HTML-level change; it cannot see the partner
    # ratios, which were hand-verified via browser.
    blind_spot: "Travel EDGE transfer-partner table is JS-rendered, not in static HTML"

  - key: amex_plat_travel
    doc_id: amex_plat_travel_reward_rules
    issuer: amex
    program: amex_membership_rewards
    url: https://www.americanexpress.com/in/credit-cards/platinum-travel-credit-card/
    crawlable: true
    # Fetchable, robots allows. General content is static, but exact figures
    # (milestone thresholds like 24,000 MR, Reward Multiplier caps) and the MR
    # transfer-partner list are NOT in static HTML (verified 2026-07-21). The
    # crawler detects when the page changes; the numbers came from the official
    # benefits catalogue, reviewed manually.
    blind_spot: "exact reward figures and MR transfer-partner list are JS-rendered / in linked catalogue, not static HTML"
