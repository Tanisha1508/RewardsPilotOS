; Alembic configuration (BUILD_SPEC §4: migrations in database/migrations/,
; single head). Kept inside database/migrations/ rather than at the repository
; root so the spec'd tree in BUILD_SPEC §2 stays as written.
;
; Run from the repository root:
;   .venv/bin/alembic -c database/migrations/alembic.ini upgrade head
;
; sqlalchemy.url is deliberately absent: env.py reads DATABASE_URL through
; backend.config.settings, so there is exactly one place a connection string
; can come from and no default to fall back to.

[alembic]
script_location = %(here)s
prepend_sys_path = %(here)s/../..
version_path_separator = os

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
